name: Build and Deploy to ECR

on:
  push:
    branches:
      - main  # Change this to your default branch if needed

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v1

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-west-1  # Setting the region here

      - name: Log in to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build and Push to ECR
        run: |
          docker build -t database-apis .
          docker tag database-apis:latest 024848475874.dkr.ecr.us-west-1.amazonaws.com/database-apis:latest
          docker push 024848475874.dkr.ecr.us-west-1.amazonaws.com/database-apis:latest

      - name: Logout from Amazon ECR
        run: docker logout 024848475874.dkr.ecr.us-west-1.amazonaws.com
